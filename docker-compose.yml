services:
  backend:
    build:
      context: ./backend
    container_name: orchids-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CACHE_TTL: ${CACHE_TTL:-300}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-15}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30000}
      MAX_RESULTS_PER_PLATFORM: ${MAX_RESULTS_PER_PLATFORM:-10}
      MAX_SERPAPI_PRODUCTS: ${MAX_SERPAPI_PRODUCTS:-8}
      MAX_SERPAPI_STORES_PER_PRODUCT: ${MAX_SERPAPI_STORES_PER_PRODUCT:-10}
      MAX_SERPAPI_ENRICHED_PRODUCTS: ${MAX_SERPAPI_ENRICHED_PRODUCTS:-8}
      SERPAPI_OFFERS_TIMEOUT: ${SERPAPI_OFFERS_TIMEOUT:-12000}
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: orchids-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
